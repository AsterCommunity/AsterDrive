name: Deploy Documentation

on:
  release:
    types: [published]
  push:
    branches: [master, 'release/**']
    tags: ['v*']
    paths:
      - 'docs/**'
      - '.github/workflows/vitepress.yml'
  workflow_dispatch:

permissions:
  contents: write # 创建 release/x.y 分支
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - uses: actions/configure-pages@v5

      - name: Create or advance release branch
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="$GITHUB_REF_NAME"
          fi
          MINOR="$(echo "$TAG" | sed -E 's/^v?([0-9]+\.[0-9]+).*/\1/')"
          if [ "$MINOR" = "0.0" ]; then
            echo "跳过没有正式 release 的 v0.0.x 版本线"
            exit 0
          fi
          # 同一 minor 的后续 patch/rc release 推进同一条 release 分支。
          # 只接受 fast-forward，避免较旧的 release event 覆盖较新的分支末端。
          git push origin "$TAG:refs/heads/release/$MINOR"
          echo "已创建或推进 release/$MINOR -> $TAG"

      - name: Build all versions
        env:
          GIT_REMOTE: origin
        run: |
          set -euo pipefail
          docs/scripts/resolve-versions.sh | tee versions.tsv
          while IFS=$'\t' read -r version path ref latest; do
            if [ "$latest" = "true" ]; then
              docs/scripts/build-version.sh "$ref" "/" dist
            else
              docs/scripts/build-version.sh "$ref" "$path" "dist$path" \
                "这是 v$version 的旧版文档。" "/" "查看最新版本 →"
            fi
          done < versions.tsv
          # 还没有任何正式发布版本时，根站点退回 master
          if [ ! -d dist ]; then
            docs/scripts/build-version.sh "origin/master" "/" dist
          fi
          # next = master 开发版，带开发版横幅
          docs/scripts/build-version.sh "origin/master" "/next/" "dist/next" \
            "这是开发中版本的文档，内容可能尚未发布。" "/" "查看稳定版本 →"

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
