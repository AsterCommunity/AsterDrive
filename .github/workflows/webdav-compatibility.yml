name: WebDAV Compatibility

on:
  push:
    branches: [master]
    paths:
      - 'src/webdav/**'
      - 'src/services/files/**'
      - 'tests/common/**'
      - 'tests/test_webdav*.rs'
      - 'tests/test_litmus_compliance.rs'
      - 'tests/fixtures/webdav/**'
      - 'scripts/ci/install-webdav-client-tools.sh'
      - 'scripts/ci/webdav-compat-versions.env'
      - '.github/workflows/webdav-compatibility.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
  pull_request:
    branches: [master, develop]
    paths:
      - 'src/webdav/**'
      - 'src/services/files/**'
      - 'tests/common/**'
      - 'tests/test_webdav*.rs'
      - 'tests/test_litmus_compliance.rs'
      - 'tests/fixtures/webdav/**'
      - 'scripts/ci/install-webdav-client-tools.sh'
      - 'scripts/ci/webdav-compat-versions.env'
      - '.github/workflows/webdav-compatibility.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
  schedule:
    - cron: '17 4 * * 2'
  workflow_dispatch:

concurrency:
  group: webdav-compatibility-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'
  CARGO_PROFILE_TEST_CODEGEN_UNITS: '16'
  CARGO_PROFILE_TEST_DEBUG: '0'

jobs:
  litmus:
    name: Litmus 0.13 baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install pinned Litmus and runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          source scripts/ci/webdav-compat-versions.env
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            "litmus=${LITMUS_UBUNTU_PACKAGE_VERSION}" \
            ffmpeg \
            libvips-tools
          test "$(litmus --version)" = "litmus ${LITMUS_VERSION}"

      - name: Record Litmus toolchain
        run: |
          mkdir -p artifacts/tool-versions
          {
            litmus --version
            dpkg-query --show --showformat='${Package}=${Version}\n' litmus
            rustc --version
            cargo --version
          } | tee artifacts/tool-versions/litmus.txt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: webdav-litmus-v1

      - name: Run Litmus conformance baseline
        env:
          LITMUS_BIN: /usr/bin/litmus
          ASTER_WEBDAV_COMPAT_ARTIFACT_DIR: ${{ github.workspace }}/artifacts
        run: |
          set -o pipefail
          cargo test --test test_litmus_compliance -- \
            --ignored --nocapture --test-threads=1 \
            2>&1 | tee artifacts/litmus-test.log

      - name: Upload Litmus results and request logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: webdav-litmus-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 30
          path: artifacts

  external-clients:
    name: Pinned rclone, curl, and cadaver clients
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install client build and runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ffmpeg \
            libneon27-dev \
            libvips-tools \
            pkg-config \
            unzip \
            xz-utils

      - name: Install pinned WebDAV clients
        env:
          WEBDAV_COMPAT_TOOLS_DIR: ${{ runner.temp }}/webdav-compat-tools
        run: scripts/ci/install-webdav-client-tools.sh

      - name: Add pinned clients to PATH
        run: echo "${{ runner.temp }}/webdav-compat-tools/bin" >> "$GITHUB_PATH"

      - name: Record client toolchain
        run: |
          mkdir -p artifacts/tool-versions
          {
            rclone version
            curl --version
            cadaver --version || true
            rustc --version
            cargo --version
          } 2>&1 | tee artifacts/tool-versions/external-clients.txt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: webdav-external-clients-v1

      - name: Run real-client compatibility tests
        run: |
          set -o pipefail
          cargo test --test test_webdav_client_e2e -- \
            --ignored --nocapture --test-threads=1 \
            2>&1 | tee artifacts/external-client-tests.log

      - name: Upload external-client results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: webdav-external-clients-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 30
          path: artifacts
