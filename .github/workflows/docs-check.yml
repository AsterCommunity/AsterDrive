name: Docs Check

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'developer-docs/**'
      - 'src/api/api_error_code.rs'
      - '.github/workflows/docs-check.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'developer-docs/**'
      - 'src/api/api_error_code.rs'
      - '.github/workflows/docs-check.yml'

permissions:
  contents: read

jobs:
  error-codes:
    name: Error code docs in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Check error codes documented in errors.md
        run: bun docs/scripts/check-error-codes.mjs

  build:
    name: Docs build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: docs-openapi-v1

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      # mermaid 构建时渲染（@beoe/rehype-mermaid）需要 chromium
      - name: Install Playwright chromium
        run: bunx playwright install --with-deps chromium

      - name: Build docs
        run: bun run docs:build

      - name: Build developer docs
        run: bun run developer-docs:build
