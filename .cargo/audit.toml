# cargo-audit 配置
# 忽略经当前调用路径复核、未形成可利用攻击面的上游 advisory

[advisories]
ignore = [
    # rsa 0.9.10 / 0.10.0-rc.18 Marvin Attack (timing sidechannel)
    # 0.9.10 经 openidconnect / webauthn 引入，只用于远端签名的公钥验证；
    # 0.10.0-rc.18 经 russh / ssh-key 引入，当前 SFTP 仅使用密码认证，
    # 根项目对 rsa 的直接依赖也仅用于测试生成临时密钥。
    # 服务路径不调用 rsa crate 的私钥解密或签名，不暴露可观测的私钥时序 oracle。
    # 上游状态：rsa crate 尚无修复版本
    "RUSTSEC-2023-0071",

    # paste 1.0.x unmaintained — dtolnay 不再维护
    # 纯编译期宏，零运行时代码，无安全风险
    "RUSTSEC-2024-0436",

    # proc-macro-error2 2.0.1 unmaintained
    # 仅通过 sea-bae -> sea-orm-macros 的 proc-macro 编译期路径引入
    # RustSec 标记为 unmaintained，非已知漏洞；不进入服务运行时攻击面
    "RUSTSEC-2026-0173",
]
